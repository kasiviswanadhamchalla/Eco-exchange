spring.application.name=marketplace-service
spring.config.import=optional:configserver:http://localhost:8888

server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/ecoexchange_marketplace?createDatabaseIfNotExist=true
spring.datasource.username=ecoexchange
spring.datasource.password=Admin@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=super-secret-key-for-jwt-signing-change-in-production
jwt.expiration=86400000

# Eureka Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
